name: Node CI Suite

on: push

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - name: linting
        run: npm run lint

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: unit tests
        run: npm test
      - name: linting
        run: npm run lint

  acceptance:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        node-version: [20.x, 22.x]
    env:
      ACCEPTANCE_TESTS: 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: install libsecret-tools for Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-tools gnome-keyring
      - name: run acceptance tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: npm run test:ci:acceptance
      - name: run acceptance tests (Linux)
        if: runner.os == 'Linux'
        run: |
          dbus-run-session -- bash -c '
            eval "$(echo -n "heroku-credential-manager-ci" | gnome-keyring-daemon --unlock --components=secrets)"
            npm run test:ci:acceptance
          '